{% extends 'base/base.html' %}
{% block title %}Excluir Reagente{% endblock %}
{% block page_title %}Confirmar Exclusão{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
<div class="card border-danger" style="border-radius:12px;">
<div class="card-body p-4 text-center">
<i class="fas fa-exclamation-triangle text-danger fa-3x mb-3"></i>
<h5>Excluir "{{ reagent.name }}"?</h5>
<p class="text-muted">Esta ação não pode ser desfeita.</p>
<form method="post" class="d-flex gap-2 justify-content-center">
{% csrf_token %}
<button type="submit" class="btn btn-danger px-4">Sim, excluir</button>
<a href="{% url 'reagents:reagent_list' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
</form>
</div>
</div>
</div></div>
{% endblock %}
