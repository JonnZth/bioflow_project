<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — BioFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .login-card { background: rgba(255,255,255,0.97); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,0.4); }
        .login-brand { text-align: center; margin-bottom: 2rem; }
        .brand-logo { width: 70px; height: 70px; background: linear-gradient(135deg, #0d6efd, #0284c7); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #fff; margin: 0 auto 1rem; box-shadow: 0 8px 20px rgba(13,110,253,.3); }
        .login-title { font-weight: 800; font-size: 1.8rem; color: #0f172a; }
        .login-sub { color: #64748b; font-size: .875rem; margin-top: .25rem; }
        .form-label { font-weight: 600; color: #374151; font-size: .85rem; }
        .form-control { border-radius: 10px; border: 2px solid #e5e7eb; padding: .65rem 1rem; transition: border-color .2s; }
        .form-control:focus { border-color: #0d6efd; box-shadow: none; }
        .input-group-text { border-radius: 10px 0 0 10px; border: 2px solid #e5e7eb; border-right: none; background: #f9fafb; color: #94a3b8; }
        .btn-login { background: linear-gradient(135deg, #0d6efd, #0284c7); border: none; border-radius: 10px; padding: .75rem; font-weight: 700; font-size: 1rem; color: #fff; width: 100%; transition: all .2s; }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(13,110,253,.3); color: #fff; }
        .login-footer { text-align: center; margin-top: 1.5rem; color: #94a3b8; font-size: .78rem; }
        .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .particle { position: absolute; background: rgba(13,110,253,.15); border-radius: 50%; animation: float 8s infinite; }
    </style>
</head>
<body>
<div class="login-card" style="position:relative;z-index:1;">
    <div class="login-brand">
        <div class="brand-logo"><i class="fas fa-flask"></i></div>
        <h1 class="login-title">BioFlow</h1>
        <p class="login-sub">Sistema de Gestão de Laboratório Biotecnológico</p>
    </div>
    {% if form.errors %}
    <div class="alert alert-danger rounded-3 py-2 px-3" style="font-size:.85rem;">
        <i class="fas fa-exclamation-circle me-2"></i>Credenciais inválidas. Tente novamente.
    </div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Usuário</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                {{ form.username }}
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Senha</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                {{ form.password }}
            </div>
        </div>
        <button type="submit" class="btn btn-login">
            <i class="fas fa-sign-in-alt me-2"></i>Entrar no Sistema
        </button>
    </form>
    <div class="login-footer">
        © 2026 BioFlow — Laboratório de Desenvolvimento de Software
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
